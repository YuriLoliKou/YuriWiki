<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./image/favicon.ico">
    <title>百合天地</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/site.css" />
    <link rel="stylesheet" href="./css/image-cover-frame.css" />
    <link rel="stylesheet" href="./css/dynamic-form.css" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3.2.45/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4.1.6/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/lodash@4.17.21/lodash.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <script src="./js/vue-mixin.js"></script>
</head>

<body id="app">
    <header style="z-index: 5;">
        <nav
            class="navbar navbar-expand-sm navbar-toggleable-sm navbar-light bg-white border-bottom box-shadow mb-3 px-5 nav-shadow navbar-animation">
            <div class="container-fluid">
                <!-- 點選標題回到首頁 -->
                <router-link class="navbar-brand fw-bold fs-3 logo-text" to="/home">百合天地</router-link>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target=".navbar-collapse"
                    aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-collapse collapse d-sm-inline-flex justify-content-between">
                    <ul class="navbar-nav flex-grow-1">
                        <li class="nav-item me-3 px-2">
                            <router-link class="nav-link text-dark" to="/manga">百合漫畫區</router-link>
                        </li>
                        <li v-show="adminAccount" class="nav-item me-3 px-2">
                            <router-link class="nav-link text-dark" to="/admin">管理區</router-link>
                        </li>
                    </ul>
                    <ul class="navbar-nav flex-grow-1" style="justify-content: flex-end">
                        <li v-show="authIsEnd" class="nav-item me-3 px-2">
                            <div v-if="!isLoginFlag" class="nav-link text-dark" @click="signIn()"
                                style="cursor:pointer">登入</div>
                            <div v-if="isLoginFlag" class="nav-link text-dark" @click="accountSignOut()"
                                style="cursor:pointer">登出</div>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="container header-margin">
        <main role="main" class="pb-3">
            <!-- 靜態背景圖片 -->
            <div class="background-video pc-limit">
                <img src="/image/bg.jpg" style=" opacity: 0.8; width: 100vw; height:auto" />
            </div>

            <div class="background-video mobile-limit">
                <img src="/image/bg.jpg" style=" opacity: 0.8; width: 100vw; height:auto" />
            </div>

            <!-- Router -->
            <router-view v-slot="{ Component }">
                <keep-alive>
                    <component :is="Component" />
                </keep-alive>
            </router-view>
        </main>
    </div>

    <div class="loading-overlay" :class="{ 'active': isLoading }">
        <div class="spinner-container">
            <div class="loading-spinner" :key="spinnerKey"></div>
            <div class="loading-text">Loading...</div>
        </div>
    </div>

    <!-- 載入核心JS，設定 type="module" 才能在瀏覽器直接使用 import/export -->
    <script type="module" src="./js/app.js"></script>
</body>

</html>
